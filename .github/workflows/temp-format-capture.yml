name: Temporary capture branch formatter

on:
  push:
    branches: [feature/capture-run-persistence-and-ingestion]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capture-run-persistence-and-ingestion
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - name: Install Python and dependencies
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-groups
      - name: Format backend
        working-directory: backend
        run: uv run ruff format .
      - name: Remove temporary workflow and commit formatting
        run: |
          rm .github/workflows/temp-format-capture.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: format capture persistence phase"
          git push origin HEAD:feature/capture-run-persistence-and-ingestion
