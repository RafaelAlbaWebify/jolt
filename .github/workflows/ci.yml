name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Install Playwright Chromium
        run: uv run playwright install chromium
      - name: Ruff check
        id: ruff
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          uv run ruff check . 2>&1 | tee ../artifacts/ruff-check.txt
          exit ${PIPESTATUS[0]}
      - name: Upload Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-ruff-diagnostics
          path: artifacts/ruff-check.txt
      - name: Fail on Ruff errors
        if: steps.ruff.outcome == 'failure'
        run: exit 1
      - name: Ruff format check
        id: ruff_format
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          uv run ruff format --check --diff . 2>&1 | tee ../artifacts/ruff-format.txt
          exit ${PIPESTATUS[0]}
      - name: Upload Ruff format diagnostics
        if: steps.ruff_format.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-ruff-format-diagnostics
          path: artifacts/ruff-format.txt
      - name: Fail on Ruff format errors
        if: steps.ruff_format.outcome == 'failure'
        run: exit 1
      - name: Pyright
        id: pyright
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          uv run pyright 2>&1 | tee ../artifacts/pyright.txt
          exit ${PIPESTATUS[0]}
      - name: Upload Pyright diagnostics
        if: steps.pyright.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-pyright-diagnostics
          path: artifacts/pyright.txt
      - name: Fail on Pyright errors
        if: steps.pyright.outcome == 'failure'
        run: exit 1
      - name: Tests
        id: pytest
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          uv run pytest 2>&1 | tee ../artifacts/pytest.txt
          exit ${PIPESTATUS[0]}
      - name: Upload pytest diagnostics
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-diagnostics
          path: artifacts/pytest.txt
      - name: Fail on test errors
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build

  windows-scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse permanent PowerShell commands
        shell: pwsh
        run: |
          $failed = $false
          $scripts = @(Get-Item JOLT.ps1) + @(Get-ChildItem tools -Filter *.ps1)
          $scripts | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.Name): $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }
      - name: Validate command contracts
        shell: pwsh
        run: |
          $launcher = Get-Content JOLT.ps1 -Raw
          $start = Get-Content tools/start-jolt.ps1 -Raw
          $stop = Get-Content tools/stop-jolt.ps1 -Raw
          $validate = Get-Content tools/validate-jolt.ps1 -Raw
          $audit = Get-Content tools/audit-jolt.ps1 -Raw
          if ($launcher -notmatch 'JOLT_REPO_PATH') { throw 'Launcher must support path-independent repository discovery.' }
          if (-not $launcher.Contains('Documents\GitHub\jolt')) { throw 'Launcher must check the standard repository path.' }
          if ($launcher -notmatch '"audit"') { throw 'Launcher must expose the automated audit action.' }
          if ($start -notmatch 'alembic upgrade head') { throw 'Startup must apply migrations.' }
          if ($start -notmatch 'Wait-HttpEndpoint') { throw 'Startup must wait for services.' }
          if ($start -notmatch 'run-linkedin-capture.ps1') { throw 'Startup must integrate supervised capture.' }
          if ($stop -notmatch 'services.json') { throw 'Stop command must use recorded state.' }
          if ($validate -notmatch 'JOLT_WINDOWS_VALIDATION_') { throw 'Validation must create a stable ZIP name.' }
          if ($audit -notmatch 'JOLT_REVIEW_AUDIT_') { throw 'Audit must create a stable ZIP name.' }
          if ($audit -notmatch 'workbench-full.png') { throw 'Audit must include a full workbench screenshot.' }
