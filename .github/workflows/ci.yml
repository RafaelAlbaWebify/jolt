name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff check
        id: ruff
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          uv run ruff check . 2>&1 | tee ../artifacts/ruff-check.txt
          exit ${PIPESTATUS[0]}
      - name: Upload Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-ruff-diagnostics
          path: artifacts/ruff-check.txt
      - name: Fail on Ruff errors
        if: steps.ruff.outcome == 'failure'
        run: exit 1
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Tests
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build
