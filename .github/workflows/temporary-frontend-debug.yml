name: Temporary frontend diagnostics

on:
  push:
    branches: [feature/opportunity-review-workbench]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/opportunity-review-workbench
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run frontend tests
        working-directory: frontend
        continue-on-error: true
        run: |
          npm install
          npm test > ../frontend-test-output.txt 2>&1
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend-test-output.txt
          git diff --cached --quiet || git commit -m "test: capture frontend diagnostics"
          git push origin HEAD:feature/opportunity-review-workbench
