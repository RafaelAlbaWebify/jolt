name: Temporary format live ingestion

on:
  pull_request:
  push:
    branches: [fix/live-capture-structured-ingestion]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/live-capture-structured-ingestion
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - name: Format backend
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-groups
          uv run ruff check . --fix
          uv run ruff format .
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git diff --cached --quiet || git commit -m "style: format live ingestion fix"
          git push origin HEAD:fix/live-capture-structured-ingestion
