name: Temporary branch formatter

on:
  push:
    branches: [feature/application-lifecycle-and-outcomes]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/application-lifecycle-and-outcomes
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - name: Install Python and dependencies
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-groups
      - name: Format backend
        working-directory: backend
        run: uv run ruff format .
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git diff --cached --quiet || git commit -m "style: apply automated backend formatting"
          git push origin HEAD:feature/application-lifecycle-and-outcomes
