name: Temporary opportunity workbench patch

on:
  push:
    branches: [feature/opportunity-review-workbench]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/opportunity-review-workbench
      - name: Patch opportunity summary workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/src/jolt/workflow.py')
          text = path.read_text(encoding='utf-8')
          old = '''            OpportunitySummary(
                  posting_id=posting.id,
                  title=posting.title,
                  company=posting.company,
                  location=posting.location,
                  recommendation=evaluation.recommendation,
                  ranking_score=evaluation.ranking_score,
                  review_decision=review.decision if review else None,
                  application_id=application.id if application else None,
                  application_status=application.status if application else None,
                  outcome_type=outcome.outcome_type if outcome else None,
              )
          '''
          new = '''            OpportunitySummary(
                  posting_id=posting.id,
                  evaluation_id=evaluation.id,
                  source_url=posting.source_document.source_url,
                  title=posting.title,
                  company=posting.company,
                  location=posting.location,
                  recommendation=evaluation.recommendation,
                  confidence=evaluation.confidence,
                  ranking_score=evaluation.ranking_score,
                  reasons=json.loads(evaluation.reasons_json),
                  profile_version_id=evaluation.profile_version_id,
                  engine_version=evaluation.engine_version,
                  review_decision=review.decision if review else None,
                  application_id=application.id if application else None,
                  application_status=application.status if application else None,
                  outcome_type=outcome.outcome_type if outcome else None,
              )
          '''
          if old not in text:
              raise SystemExit('Expected OpportunitySummary block was not found.')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Format and test backend
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-groups
          uv run ruff check . --fix
          uv run ruff format .
          uv run pyright
          uv run pytest
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git diff --cached --quiet || git commit -m "feat: include evaluation evidence in opportunity queue"
          git push origin HEAD:feature/opportunity-review-workbench
