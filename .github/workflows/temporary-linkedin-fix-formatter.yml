name: Temporary LinkedIn fix formatter

on:
  push:
    branches: [fix/linkedin-live-selector-diagnostics]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/linkedin-live-selector-diagnostics
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - name: Install dependencies
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-groups
      - name: Format and fix lint
        working-directory: backend
        run: |
          uv run ruff format .
          uv run ruff check . --fix
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git diff --cached --quiet || git commit -m "style: format LinkedIn capture fix"
          git push origin HEAD:fix/linkedin-live-selector-diagnostics
